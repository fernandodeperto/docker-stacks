groups:
- name: Node Exporter
  rules:
  - alert: NodeFilesystemSpaceFillingUp
    annotations:
      description: Filesystem on {{ $labels.device }} at {{ $labels.instance }} has
        only {{ printf "%.2f" $value }}% available space left and is filling up.
      summary: Filesystem is predicted to run out of space within the next 24 hours.
    expr: (node_filesystem_avail_bytes{job="node",fstype!=""} / node_filesystem_size_bytes{job="node",fstype!=""}
      * 100 < 40 and predict_linear(node_filesystem_avail_bytes{job="node",fstype!=""}[6h],
      24*60*60) < 0 and node_filesystem_readonly{job="node",fstype!=""} == 0)
    for: 1h
    labels:
      severity: warning
  - alert: NodeFilesystemSpaceFillingUp
    annotations:
      description: Filesystem on {{ $labels.device }} at {{ $labels.instance }} has
        only {{ printf "%.2f" $value }}% available space left and is filling up fast.
      summary: Filesystem is predicted to run out of space within the next 4 hours.
    expr: (node_filesystem_avail_bytes{job="node",fstype!=""} / node_filesystem_size_bytes{job="node",fstype!=""}
      * 100 < 20 and predict_linear(node_filesystem_avail_bytes{job="node",fstype!=""}[6h],
      4*60*60) < 0 and node_filesystem_readonly{job="node",fstype!=""} == 0)
    for: 1h
    labels:
      severity: critical
  - alert: NodeFilesystemAlmostOutOfSpace
    annotations:
      description: Filesystem on {{ $labels.device }} at {{ $labels.instance }} has
        only {{ printf "%.2f" $value }}% available space left.
      summary: Filesystem has less than 5% space left.
    expr: (node_filesystem_avail_bytes{job="node",fstype!=""} / node_filesystem_size_bytes{job="node",fstype!=""}
      * 100 < 5 and node_filesystem_readonly{job="node",fstype!=""} == 0)
    for: 1h
    labels:
      severity: warning
  - alert: NodeFilesystemAlmostOutOfSpace
    annotations:
      description: Filesystem on {{ $labels.device }} at {{ $labels.instance }} has
        only {{ printf "%.2f" $value }}% available space left.
      summary: Filesystem has less than 3% space left.
    expr: (node_filesystem_avail_bytes{job="node",fstype!=""} / node_filesystem_size_bytes{job="node",fstype!=""}
      * 100 < 3 and node_filesystem_readonly{job="node",fstype!=""} == 0)
    for: 1h
    labels:
      severity: critical
  - alert: NodeFilesystemAlmostOutOfFiles
    annotations:
      description: Filesystem on {{ $labels.device }} at {{ $labels.instance }} has
        only {{ printf "%.2f" $value }}% available inodes left.
      summary: Filesystem has less than 3% inodes left.
    expr: (node_filesystem_files_free{job="node",fstype!=""} / node_filesystem_files{job="node",fstype!=""}
      * 100 < 3 and node_filesystem_readonly{job="node",fstype!=""} == 0)
    for: 1h
    labels:
      severity: critical
  - alert: NodeNetworkReceiveErrs
    annotations:
      description: '{{ $labels.instance }} interface {{ $labels.device }} has encountered
        {{ printf "%.0f" $value }} receive errors in the last two minutes.'
      summary: Network interface is reporting many receive errors.
    expr: increase(node_network_receive_errs_total[2m]) > 10
    for: 1h
    labels:
      severity: warning
  - alert: NodeNetworkTransmitErrs
    annotations:
      description: '{{ $labels.instance }} interface {{ $labels.device }} has encountered
        {{ printf "%.0f" $value }} transmit errors in the last two minutes.'
      summary: Network interface is reporting many transmit errors.
    expr: increase(node_network_transmit_errs_total[2m]) > 10
    for: 1h
    labels:
      severity: warning
  - alert: NodeHighNumberConntrackEntriesUsed
    annotations:
      description: '{{ $value | humanizePercentage }} of conntrack entries are used'
      summary: Number of conntrack are getting close to the limit
    expr: (node_nf_conntrack_entries / node_nf_conntrack_entries_limit) > 0.75
    labels:
      severity: warning
  - alert: NodeClockSkewDetected
    annotations:
      message: Clock on {{ $labels.instance }} is out of sync by more than 300s. Ensure
        NTP is configured correctly on this host.
      summary: Clock skew detected.
    expr: (node_timex_offset_seconds > 0.05 and deriv(node_timex_offset_seconds[5m])
      >= 0) or (node_timex_offset_seconds < -0.05 and deriv(node_timex_offset_seconds[5m])
      <= 0)
    for: 10m
    labels:
      severity: warning
  - alert: NodeClockNotSynchronising
    annotations:
      message: Clock on {{ $labels.instance }} is not synchronising. Ensure NTP is configured
        on this host.
      summary: Clock not synchronising.
    expr: min_over_time(node_timex_sync_status[5m]) == 0
    for: 10m
    labels:
      severity: warning
  - alert: NodeAvailableMemoryLow
    annotations:
      message: Available memory on {{ $labels.host }} is low with  {{ printf "%.2f"
        $value }}% available left.
      summary: Available memory low.
    expr: node_memory_MemAvailable_bytes{} * 100 / node_memory_MemTotal_bytes{} < 10
    for: 10m
    labels:
      severity: warning
  - alert: NodeUptimeHigh
    annotations:
      message: Uptime on {{ $labels.host }} is higher than 30 days.
      summary: Uptime high.
    expr: (node_time_seconds{} - node_boot_time_seconds{}) > 2592000
    for: 5m
    labels:
      severity: warning

